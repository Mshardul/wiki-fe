<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <script>
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem("wiki-settings") || "null");
          var bg = (s && s.backgroundId) || "";
          var dark = bg
            ? bg.indexOf("dark") === 0
            : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light"
          );
          if (s && s.fontSize) {
            var sizes = { S: "14px", M: "16px", L: "18px" };
            document.documentElement.style.fontSize =
              sizes[s.fontSize] || "16px";
          }
        } catch (e) {}
      })();
    </script>
    <link rel="stylesheet" href="./css/wiki.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    <div id="reading-progress" class="reading-progress"></div>
    <div class="vignette-layer" aria-hidden="true"></div>

    <!-- ══════════════════════════════════════
       GLOBAL SEARCH MODAL (⌘K)
  ══════════════════════════════════════ -->
    <div
      id="global-search-modal"
      class="gsearch-modal hidden"
      aria-hidden="true"
    >
      <div class="gsearch-backdrop" id="gsearch-backdrop"></div>
      <div class="gsearch-dialog" role="dialog" aria-label="Global search">
        <div class="gsearch-input-wrap">
          <svg class="gsearch-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="8.5"
              cy="8.5"
              r="5.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M13 13l3.5 3.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <input
            type="text"
            id="gsearch-input"
            class="gsearch-input"
            placeholder="Search all wikis…"
            aria-label="Search all wikis"
            autocomplete="off"
            spellcheck="false"
          />
          <span
            id="gsearch-count"
            class="gsearch-count"
            aria-live="polite"
          ></span>
          <kbd class="gsearch-esc-key">ESC</kbd>
        </div>
        <div
          id="gsearch-results"
          class="gsearch-results"
          role="region"
          aria-label="Search results"
          aria-live="polite"
        >
          <div class="gsearch-empty">Start typing to search…</div>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 1 - HOME
  ══════════════════════════════════════ -->
    <div id="view-home" class="view active">
      <div class="home-bg-grid" aria-hidden="true"></div>
      <div class="home-glow" aria-hidden="true"></div>
      <div class="home-topbar">
        <button
          class="topbar-icon-btn"
          data-action="search-open"
          title="Search all (⌘K)"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <circle
              cx="8.5"
              cy="8.5"
              r="5.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M13 13l3.5 3.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button
          class="topbar-icon-btn"
          title="Preferences (,)"
          data-action="settings-open"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <path
              d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linejoin="round"
            />
            <circle
              cx="10"
              cy="10"
              r="2.3"
              stroke="currentColor"
              stroke-width="1.4"
            />
          </svg>
        </button>
      </div>
      <header class="home-header">
        <div class="home-eyebrow">Documentation</div>
        <h1 class="home-title">Knowledge Base</h1>
        <p class="home-subtitle">
          Interview-ready references, deep dives, and system design walkthroughs
          - all in one place.
        </p>
      </header>
      <main id="main-content" class="home-main">
        <div id="wiki-grid" class="wiki-grid"></div>
      </main>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 2 - WIKI INDEX
  ══════════════════════════════════════ -->
    <div id="view-index" class="view">
      <div class="page-topbar">
        <div class="topbar-inner">
          <button class="back-btn" data-action="wiki-home">
            <svg viewBox="0 0 16 16" fill="none">
              <path
                d="M10 4L6 8l4 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Home
          </button>
          <nav id="index-breadcrumb" class="breadcrumb"></nav>
          <button
            class="topbar-icon-btn"
            data-action="search-open"
            title="Search all (⌘K)"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <circle
                cx="8.5"
                cy="8.5"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M13 13l3.5 3.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            title="Preferences (,)"
            data-action="settings-open"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.3"
                stroke="currentColor"
                stroke-width="1.4"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="page-hero">
        <div class="page-hero-inner">
          <h1 id="index-title" class="page-title"></h1>
          <p id="index-subtitle" class="page-subtitle"></p>
        </div>
      </div>
      <main class="index-main">
        <div id="recents-section" class="recents-section hidden"></div>
        <div id="bookmarks-section" class="recents-section hidden"></div>
        <div id="index-sections" class="index-sections"></div>
      </main>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 3 - CONTENT
  ══════════════════════════════════════ -->
    <div id="view-content" class="view">
      <div class="content-topbar">
        <div class="topbar-inner">
          <button class="back-btn" id="content-back-btn">
            <svg viewBox="0 0 16 16" fill="none">
              <path
                d="M10 4L6 8l4 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Back
          </button>
          <nav id="content-breadcrumb" class="breadcrumb"></nav>
          <div id="topbar-title" class="topbar-title"></div>
          <span id="content-read-time" class="read-time-badge"></span>
          <button
            id="content-read-btn"
            class="topbar-icon-btn"
            title="Mark as read"
            data-action="read-toggle"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M10 4C5.5 4 2 10 2 10s3.5 6 8 6 8-6 8-6-3.5-6-8-6z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
          </button>
          <button
            id="content-bookmark-btn"
            class="topbar-icon-btn"
            title="Bookmark"
            data-action="bookmark-toggle"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M5 3h10a1 1 0 011 1v13l-6-3-6 3V4a1 1 0 011-1z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="content-focus-btn"
            class="topbar-icon-btn"
            title="Focus mode (F)"
            aria-label="Focus mode"
            data-action="focus-toggle"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M3 7V3h4M13 3h4v4M17 13v4h-4M7 17H3v-4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="content-offline-btn"
            class="topbar-icon-btn"
            title="Save for offline"
            data-action="offline-toggle"
          >
            <svg class="offline-icon-download" viewBox="0 0 20 20" fill="none">
              <path
                d="M10 3v10M6 9l4 4 4-4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M3 15h14"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <svg
              class="offline-icon-check"
              viewBox="0 0 20 20"
              fill="none"
              style="display: none"
            >
              <path
                d="M4 10l5 5 8-8"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            data-action="search-open"
            title="Search all (⌘K)"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <circle
                cx="8.5"
                cy="8.5"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M13 13l3.5 3.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            title="Preferences (,)"
            data-action="settings-open"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.3"
                stroke="currentColor"
                stroke-width="1.4"
              />
            </svg>
          </button>
        </div>
      </div>

      <div
        id="sticky-section-header"
        class="sticky-section-header"
        aria-hidden="true"
      ></div>

      <div id="article-hero" class="article-hero">
        <div class="article-hero-mesh" aria-hidden="true"></div>
        <div
          class="article-hero-ghost"
          id="article-hero-ghost"
          aria-hidden="true"
        ></div>
      </div>

      <div class="content-layout">
        <article id="markdown-body" class="markdown-body">
          <div id="related-articles" class="related-articles"></div>
        </article>
        <aside id="toc-sidebar" class="toc-sidebar">
          <div class="toc-header">
            <span class="toc-label">On this page</span>
            <button id="toc-collapse" class="toc-collapse" title="Collapse">
              <svg viewBox="0 0 14 14" fill="none">
                <path
                  d="M9 3L5 7l4 4"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <nav id="toc-nav" class="toc-nav"></nav>
        </aside>
      </div>
      <!-- Mobile TOC -->
      <button
        id="toc-mobile-btn"
        class="toc-mobile-btn"
        title="Table of contents"
      >
        <svg viewBox="0 0 20 20" fill="none">
          <path
            d="M4 6h12M4 10h8M4 14h10"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <div id="toc-mobile-overlay" class="toc-mobile-overlay"></div>
    </div>

    <!-- ══════════════════════════════════════
       SHARED - SCROLL TO TOP
  ══════════════════════════════════════ -->
    <button
      id="scroll-top"
      class="scroll-top-btn"
      title="Back to top"
      aria-label="Scroll to top"
    >
      <svg viewBox="0 0 20 20" fill="none">
        <path
          d="M10 14V6M6 10l4-4 4 4"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <!-- ══════════════════════════════════════
       PREFERENCES MODAL
  ══════════════════════════════════════ -->
    <div
      id="prefs-modal"
      class="prefs-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-label="Preferences"
      aria-hidden="true"
    >
      <div class="prefs-backdrop" id="prefs-backdrop"></div>
      <div class="prefs-dialog">
        <div class="prefs-drag-handle" aria-hidden="true"></div>
        <div class="prefs-header">
          <div class="prefs-header-text">
            <span class="prefs-title">Preferences</span>
            <span class="prefs-subtitle">Customize your experience</span>
          </div>
          <button
            class="prefs-close-btn"
            data-action="prefs-close"
            aria-label="Close"
          >
            <svg viewBox="0 0 14 14" fill="none">
              <path
                d="M1 1l12 12M13 1L1 13"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <div class="prefs-tabs" role="tablist" aria-label="Preferences tabs">
          <button
            class="prefs-tab active"
            role="tab"
            aria-selected="true"
            aria-controls="prefs-panel-general"
            data-action="prefs-tab"
            data-tab="general"
          >
            General
          </button>
          <button
            class="prefs-tab"
            role="tab"
            aria-selected="false"
            aria-controls="prefs-panel-keyboard"
            data-action="prefs-tab"
            data-tab="keyboard"
          >
            Keyboard
          </button>
          <button
            class="prefs-tab"
            role="tab"
            aria-selected="false"
            aria-controls="prefs-panel-advanced"
            data-action="prefs-tab"
            data-tab="advanced"
          >
            Advanced
          </button>
        </div>
        <div class="prefs-body">
          <div
            class="prefs-panel active"
            id="prefs-panel-general"
            role="tabpanel"
            aria-hidden="false"
          >
            <div class="prefs-general-grid">
              <div class="prefs-col">
                <div class="prefs-section">
                  <div class="prefs-section-label">Background</div>
                  <div id="settings-backgrounds" class="settings-bg-row"></div>
                </div>
                <div class="prefs-section">
                  <div class="prefs-section-label">Text</div>
                  <div
                    id="settings-text-colors"
                    class="settings-text-row"
                  ></div>
                </div>
                <div class="prefs-section">
                  <div class="prefs-section-label">Accent</div>
                  <div id="settings-accents" class="settings-accent-row"></div>
                </div>
              </div>
              <div class="prefs-col">
                <div class="prefs-section">
                  <div class="prefs-section-label">Font</div>
                  <div id="settings-fonts" class="settings-font-grid"></div>
                </div>
                <div class="prefs-section">
                  <div class="prefs-section-label">Size</div>
                  <div id="settings-sizes" class="settings-size-row"></div>
                </div>
                <div class="prefs-section">
                  <div class="prefs-section-label">Width</div>
                  <div id="settings-widths" class="settings-size-row"></div>
                </div>
              </div>
            </div>
          </div>
          <div
            class="prefs-panel"
            id="prefs-panel-keyboard"
            role="tabpanel"
            aria-hidden="true"
          >
            <div id="prefs-shortcuts-body" class="prefs-shortcuts-body"></div>
          </div>
          <div
            class="prefs-panel"
            id="prefs-panel-advanced"
            role="tabpanel"
            aria-hidden="true"
          >
            <div class="prefs-section">
              <div class="prefs-section-label">Data</div>
              <div class="settings-size-row">
                <button class="settings-size-btn" data-action="settings-export">
                  Export
                </button>
                <button class="settings-size-btn" data-action="import-trigger">
                  Import
                </button>
                <input
                  type="file"
                  id="import-upload"
                  accept=".json"
                  aria-label="Import backup file"
                  style="display: none"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="hover-preview"
      class="hover-preview hidden"
      aria-hidden="true"
    ></div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"
      integrity="sha384-GP2+CwBlakZSDJUr+E4JvbxpM75i1i8+RKkieQxzuyDZLG+5105E1OfHIjzcXyWH"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
      integrity="sha512-nUtM9NVH2asbl/jVPVJAtyURcumwR6PNy6G/YRh3qmDidWTR57qDrnZjv0+p3VuGxmRWcrkodverXRftmLInsA=="
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mermaid@10.9.5/dist/mermaid.min.js"
      integrity="sha384-enVdc7lTHDGtpROV85t9+VqPC2EyyB0hsRD0MrvQnHUsHmTHIz2D8SPP4EnBkstH"
      crossorigin="anonymous"
    ></script>

    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"
      integrity="sha512-5g2Nj3mqLOgClHi20oat1COW7jWvf7SyqnvwWUsMDwhjHeqeTl0C+uzjucLweruQxHbhDwiPLXlm8HBO0011pA=="
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
      integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
      integrity="sha384-+VBxd3r6XgURycqtZ117nYw44OOcIax56Z4dCRWbxyPt0Koah1uHoK0o4+/RRE05"
      crossorigin="anonymous"
    ></script>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
