<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
    />
    <link rel="stylesheet" href="./css/wiki.css" />
  </head>
  <body>
    <a href="#main-content" class="skip-to-content">Skip to content</a>
    <div id="reading-progress" class="reading-progress"></div>

    <!-- ══════════════════════════════════════
       GLOBAL SEARCH MODAL (⌘K)
  ══════════════════════════════════════ -->
    <div
      id="global-search-modal"
      class="gsearch-modal hidden"
      aria-hidden="true"
    >
      <div class="gsearch-backdrop" id="gsearch-backdrop"></div>
      <div class="gsearch-dialog" role="dialog" aria-label="Global search">
        <div class="gsearch-input-wrap">
          <svg class="gsearch-icon" viewBox="0 0 20 20" fill="none">
            <circle
              cx="8.5"
              cy="8.5"
              r="5.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M13 13l3.5 3.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
          <input
            type="text"
            id="gsearch-input"
            class="gsearch-input"
            placeholder="Search all wikis…"
            aria-label="Search all wikis"
            autocomplete="off"
            spellcheck="false"
          />
          <kbd class="gsearch-esc-key">ESC</kbd>
        </div>
        <div
          id="gsearch-results"
          class="gsearch-results"
          role="region"
          aria-label="Search results"
          aria-live="polite"
        >
          <div class="gsearch-empty">Start typing to search…</div>
        </div>
      </div>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 1 - HOME
  ══════════════════════════════════════ -->
    <div id="view-home" class="view active">
      <div class="home-bg-grid" aria-hidden="true"></div>
      <div class="home-glow" aria-hidden="true"></div>
      <div class="home-topbar">
        <button
          class="topbar-icon-btn"
          data-action="search-open"
          title="Search all (⌘K)"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <circle
              cx="8.5"
              cy="8.5"
              r="5.5"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M13 13l3.5 3.5"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button
          class="theme-toggle-btn"
          title="Toggle theme"
          data-action="theme-toggle"
        >
          <svg class="theme-icon-moon" viewBox="0 0 20 20" fill="none">
            <path
              d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <svg class="theme-icon-sun" viewBox="0 0 20 20" fill="none">
            <circle
              cx="10"
              cy="10"
              r="4"
              stroke="currentColor"
              stroke-width="1.5"
            />
            <path
              d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <button
          class="topbar-icon-btn"
          title="Settings"
          data-action="settings-open"
        >
          <svg viewBox="0 0 20 20" fill="none">
            <path
              d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
              stroke="currentColor"
              stroke-width="1.4"
              stroke-linejoin="round"
            />
            <circle
              cx="10"
              cy="10"
              r="2.3"
              stroke="currentColor"
              stroke-width="1.4"
            />
          </svg>
        </button>
      </div>
      <header class="home-header">
        <div class="home-eyebrow">Documentation</div>
        <h1 class="home-title">Knowledge Base</h1>
        <p class="home-subtitle">
          Interview-ready references, deep dives, and system design walkthroughs
          - all in one place.
        </p>
      </header>
      <main id="main-content" class="home-main">
        <div id="wiki-grid" class="wiki-grid"></div>
      </main>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 2 - WIKI INDEX
  ══════════════════════════════════════ -->
    <div id="view-index" class="view">
      <div class="page-topbar">
        <div class="topbar-inner">
          <button class="back-btn" data-action="wiki-home">
            <svg viewBox="0 0 16 16" fill="none">
              <path
                d="M10 4L6 8l4 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Home
          </button>
          <nav id="index-breadcrumb" class="breadcrumb"></nav>
          <button
            class="topbar-icon-btn"
            data-action="search-open"
            title="Search all (⌘K)"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <circle
                cx="8.5"
                cy="8.5"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M13 13l3.5 3.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="theme-toggle-btn"
            title="Toggle theme"
            data-action="theme-toggle"
          >
            <svg class="theme-icon-moon" viewBox="0 0 20 20" fill="none">
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="theme-icon-sun" viewBox="0 0 20 20" fill="none">
              <circle
                cx="10"
                cy="10"
                r="4"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            title="Settings"
            data-action="settings-open"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.3"
                stroke="currentColor"
                stroke-width="1.4"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="page-hero">
        <div class="page-hero-inner">
          <h1 id="index-title" class="page-title"></h1>
          <p id="index-subtitle" class="page-subtitle"></p>
        </div>
      </div>
      <main class="index-main">
        <div id="recents-section" class="recents-section hidden"></div>
        <div id="bookmarks-section" class="recents-section hidden"></div>
        <div id="index-sections" class="index-sections"></div>
      </main>
    </div>

    <!-- ══════════════════════════════════════
       VIEW 3 - CONTENT
  ══════════════════════════════════════ -->
    <div id="view-content" class="view">
      <div class="content-topbar">
        <div class="topbar-inner">
          <button class="back-btn" id="content-back-btn">
            <svg viewBox="0 0 16 16" fill="none">
              <path
                d="M10 4L6 8l4 4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            Back
          </button>
          <nav id="content-breadcrumb" class="breadcrumb"></nav>
          <div id="topbar-title" class="topbar-title"></div>
          <span id="content-read-time" class="read-time-badge"></span>
          <button
            id="content-read-btn"
            class="topbar-icon-btn"
            title="Mark as read"
            data-action="read-toggle"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M10 4C5.5 4 2 10 2 10s3.5 6 8 6 8-6 8-6-3.5-6-8-6z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
            </svg>
          </button>
          <button
            id="content-bookmark-btn"
            class="topbar-icon-btn"
            title="Bookmark"
            data-action="bookmark-toggle"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M5 3h10a1 1 0 011 1v13l-6-3-6 3V4a1 1 0 011-1z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            id="content-offline-btn"
            class="topbar-icon-btn"
            title="Save for offline"
            data-action="offline-toggle"
          >
            <svg class="offline-icon-download" viewBox="0 0 20 20" fill="none">
              <path
                d="M10 3v10M6 9l4 4 4-4"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <path
                d="M3 15h14"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            <svg
              class="offline-icon-check"
              viewBox="0 0 20 20"
              fill="none"
              style="display: none"
            >
              <path
                d="M4 10l5 5 8-8"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            data-action="search-open"
            title="Search all (⌘K)"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <circle
                cx="8.5"
                cy="8.5"
                r="5.5"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M13 13l3.5 3.5"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="theme-toggle-btn"
            title="Toggle theme"
            data-action="theme-toggle"
          >
            <svg class="theme-icon-moon" viewBox="0 0 20 20" fill="none">
              <path
                d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            <svg class="theme-icon-sun" viewBox="0 0 20 20" fill="none">
              <circle
                cx="10"
                cy="10"
                r="4"
                stroke="currentColor"
                stroke-width="1.5"
              />
              <path
                d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
          <button
            class="topbar-icon-btn"
            title="Settings"
            data-action="settings-open"
          >
            <svg viewBox="0 0 20 20" fill="none">
              <path
                d="M8.5 2h3l.6 2.2a5.5 5.5 0 011.7 1l2.1-.8 1.5 2.6-1.6 1.6a5.5 5.5 0 010 2l1.6 1.6-1.5 2.6-2.1-.8a5.5 5.5 0 01-1.7 1L11.5 18h-3l-.6-2.2a5.5 5.5 0 01-1.7-1l-2.1.8-1.5-2.6 1.6-1.6a5.5 5.5 0 010-2L2.6 7.8l1.5-2.6 2.1.8a5.5 5.5 0 011.7-1L8.5 2z"
                stroke="currentColor"
                stroke-width="1.4"
                stroke-linejoin="round"
              />
              <circle
                cx="10"
                cy="10"
                r="2.3"
                stroke="currentColor"
                stroke-width="1.4"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="content-layout">
        <article id="markdown-body" class="markdown-body">
          <div id="related-articles" class="related-articles"></div>
        </article>
        <aside id="toc-sidebar" class="toc-sidebar">
          <div class="toc-header">
            <span class="toc-label">On this page</span>
            <button id="toc-collapse" class="toc-collapse" title="Collapse">
              <svg viewBox="0 0 14 14" fill="none">
                <path
                  d="M9 3L5 7l4 4"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <nav id="toc-nav" class="toc-nav"></nav>
        </aside>
      </div>
      <!-- Mobile TOC -->
      <button
        id="toc-mobile-btn"
        class="toc-mobile-btn"
        title="Table of contents"
      >
        <svg viewBox="0 0 20 20" fill="none">
          <path
            d="M4 6h12M4 10h8M4 14h10"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
      </button>
      <div id="toc-mobile-overlay" class="toc-mobile-overlay"></div>
    </div>

    <!-- ══════════════════════════════════════
       SHARED - SCROLL TO TOP
  ══════════════════════════════════════ -->
    <button
      id="scroll-top"
      class="scroll-top-btn"
      title="Back to top"
      aria-label="Scroll to top"
    >
      <svg viewBox="0 0 20 20" fill="none">
        <path
          d="M10 14V6M6 10l4-4 4 4"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>

    <!-- ══════════════════════════════════════
       SETTINGS PANEL
  ══════════════════════════════════════ -->
    <div
      id="settings-panel"
      class="settings-panel hidden"
      role="dialog"
      aria-label="Settings"
      aria-hidden="true"
    >
      <div class="settings-backdrop" id="settings-backdrop"></div>
      <div class="settings-drawer">
        <div class="settings-header">
          <span class="settings-title">Settings</span>
          <button
            class="settings-close-btn"
            data-action="settings-close"
            title="Close"
          >
            <svg viewBox="0 0 14 14" fill="none">
              <path
                d="M1 1l12 12M13 1L1 13"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
        <div class="settings-body">
          <div class="settings-group">
            <div class="settings-group-label">Theme</div>
            <div class="settings-section">
              <div class="settings-section-label">Background</div>
              <div id="settings-backgrounds" class="settings-bg-row"></div>
            </div>
            <div class="settings-section">
              <div class="settings-section-label">Text</div>
              <div id="settings-text-colors" class="settings-text-row"></div>
            </div>
            <div class="settings-section">
              <div class="settings-section-label">Accent</div>
              <div id="settings-accents" class="settings-accent-row"></div>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-group-label">Text</div>
            <div class="settings-section">
              <div class="settings-section-label">Font</div>
              <div id="settings-fonts" class="settings-font-grid"></div>
            </div>
            <div class="settings-section">
              <div class="settings-section-label">Size</div>
              <div id="settings-sizes" class="settings-size-row"></div>
            </div>
            <div class="settings-section">
              <div class="settings-section-label">Width</div>
              <div id="settings-widths" class="settings-size-row"></div>
            </div>
          </div>
          <div class="settings-group">
            <div class="settings-group-label">Data</div>
            <div class="settings-section">
              <div class="settings-size-row">
                <button class="settings-size-btn" data-action="settings-export">
                  Export
                </button>
                <button class="settings-size-btn" data-action="import-trigger">
                  Import
                </button>
                <input
                  type="file"
                  id="import-upload"
                  accept=".json"
                  aria-label="Import backup file"
                  style="display: none"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      id="hover-preview"
      class="hover-preview hidden"
      aria-hidden="true"
    ></div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/showdown@2.1.0/dist/showdown.min.js"
    ></script>
    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"
    ></script>

    <script
      defer
      src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    ></script>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
