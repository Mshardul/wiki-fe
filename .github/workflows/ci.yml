name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Authoritative gate: check-only hooks (never auto-fix) against all files.
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --config .pre-commit-config.ci.yaml

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Tests (e2e)
        run: pytest tests/ -q

  dead-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Offline broken-link check across docs and HTML. content/ excluded —
      # authored wiki articles use app-internal hash routes, not real URLs.
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress './**/*.md' './**/*.html' --exclude-path content
          fail: true
