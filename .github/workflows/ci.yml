name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Authoritative gate: check-only hooks (never auto-fix) against all files.
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --config .pre-commit-config.ci.yaml

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test deps
        run: pip install -r requirements-dev.txt

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      # CDN assets tests mock are version-pinned in conftest.py, so a cache keyed on its
      # hash is valid until a version bumps (which changes the hash and the URL together).
      - name: Cache CDN assets
        uses: actions/cache@v4
        with:
          path: tests/.cdn-cache
          key: cdn-assets-${{ hashFiles('tests/conftest.py') }}

      - name: Tests (e2e)
        run: pytest tests/ -q -n auto

  search-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate search-index.json and check it's committed
        run: |
          python3 scripts/build_search_index.py
          git diff --exit-code content/search-index.json

  backlinks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate backlinks.json and check it's committed
        run: |
          python3 scripts/build_search_index.py
          python3 scripts/build_backlinks.py
          git diff --exit-code content/backlinks.json

  broken-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Regenerate broken-links.json and check it's committed
        run: |
          python3 scripts/build_search_index.py
          python3 scripts/build_broken_links.py
          git diff --exit-code content/broken-links.json

  cache-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Bump ARTICLE_CACHE version and check it's committed
        run: |
          python3 scripts/bump_cache_version.py
          git diff --exit-code wiki-sw.js

  dead-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Offline broken-link check across docs and HTML. content/ excluded -
      # authored wiki articles use app-internal hash routes, not real URLs.
      - name: Link check (lychee)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --root-dir . './**/*.md' './**/*.html' --exclude-path content
          fail: true
